name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          REMOTE_PORT="${SERVER_PORT:-22}"
          for attempt in 1 2 3; do
            if ssh-keyscan -p "$REMOTE_PORT" -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Failed to fetch SSH host key from $SERVER_HOST:$REMOTE_PORT" >&2
          exit 1

      - name: Deploy over SSH
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          PROJECT_PATH: ${{ secrets.PROJECT_PATH }}
          PM2_APP_NAME: ${{ secrets.PM2_APP_NAME }}
          INSTALL_REQUIREMENTS: "0"
        run: |
          set -euo pipefail
          REMOTE_PORT="${SERVER_PORT:-22}"
          ssh \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=6 \
            -o TCPKeepAlive=yes \
            -p "$REMOTE_PORT" "$SERVER_USER@$SERVER_HOST" \
            "export PROJECT_PATH='${PROJECT_PATH}' PM2_APP_NAME='${PM2_APP_NAME}' BRANCH='main' INSTALL_REQUIREMENTS='${INSTALL_REQUIREMENTS}'; \
             PROJECT_PATH=\${PROJECT_PATH:-/root/Progress-Check-mini-app-Telegram-}; \
             PM2_APP_NAME=\${PM2_APP_NAME:-miniapp}; \
             bash \"\$PROJECT_PATH/scripts/deploy.sh\""
