<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Progress Check</title>
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <link rel="stylesheet" href="/static/styles.css?v=22">
</head>
<body>
  <div class="device-shell">
    <div class="screen-glow"></div>
    <div class="app-shell">
      <header class="topbar">

        <h1 id="screen-title">Главная</h1>
        
      </header>

      <main class="content">
        <section class="panel active" data-panel="home">
          <div class="hero-row">
         
            <div class="streak-badge"><span id="streak-value">0</span><span class="fire">🔥</span></div>
          </div>

          <button class="action-card primary" id="open-workout-flow" type="button">
            <span>Добавить тренировку</span>
            <span class="plus">+</span>
          </button>
        </section>

        <section class="panel" data-panel="profile">
          <section class="profile-card">
            <h2>Мои данные</h2>
            <div class="profile-list">
              <div class="profile-line"><span>Имя</span><strong id="profile-name">Пользователь</strong></div>
              <div class="profile-line"><span>Вес</span><strong id="weight-value">—</strong></div>
              <div class="profile-line"><span>Рост</span><strong id="height-value">—</strong></div>
              <div class="profile-line"><span>Стаж</span><strong id="experience-value">—</strong></div>
              <div class="profile-line"><span>Тренировок</span><strong id="workouts-value">0</strong></div>
            </div>
          </section>

          <section class="section-block">
            <div class="section-title">
              <h2>История тренировок</h2>
              <button class="history-manage-btn" id="history-manage-toggle" type="button">Изменить</button>
            </div>
            <div class="history-bulk-actions" id="history-bulk-actions" hidden>
              <button class="history-bulk-btn" id="history-delete-selected" type="button">Удалить выбранные</button>
              <button class="history-bulk-btn danger" id="history-delete-all" type="button">Удалить все</button>
              <button class="history-bulk-btn subtle" id="history-manage-cancel" type="button">Отмена</button>
            </div>
            <div id="history-list" class="list-stack"></div>
          </section>
        </section>

        <section class="panel" data-panel="records">
          <div class="records-toolbar">
            <button class="records-tool-btn" type="button" id="delete-btn" aria-label="Режим редактирования рекордов">Изменить</button>
            <button class="records-tool-btn add" type="button" id="move-btn" aria-label="Добавить рекорд">Добавить</button>
          </div>
          <div class="history-bulk-actions records-bulk-actions" id="records-bulk-actions" hidden>
            <button class="history-bulk-btn" id="records-delete-selected" type="button">Удалить выбранные</button>
            <button class="history-bulk-btn danger" id="records-delete-all" type="button">Удалить все</button>
            <button class="history-bulk-btn subtle" id="records-manage-cancel" type="button">Отмена</button>
          </div>
          <div id="records-list" class="list-stack"></div>
        </section>

        <section class="panel" data-panel="faq">
          <div class="search-shell">
            <input type="search" id="faq-search" placeholder="Поиск вопросов...">
          </div>
          <div id="faq-tabs" class="chip-row"></div>
          <div id="faq-list" class="list-stack"></div>
        </section>
      </main>

      <nav class="bottom-nav" id="bottom-nav">
        <span class="nav-pill" id="nav-pill" aria-hidden="true"></span>
        <button class="nav-btn active" data-tab="home" type="button">
          <span class="nav-icon"><i class='bx bxs-home'></i></span>
          <span class="nav-label">Главная</span>
        </button>
        <button class="nav-btn" data-tab="profile" type="button">
          <span class="nav-icon"><i class='bx bxs-user'></i></span>
          <span class="nav-label">Профиль</span>
        </button>
        <button class="nav-btn" data-tab="records" type="button">
          <span class="nav-icon"><i class='bx bxs-trophy'></i></span>
          <span class="nav-label">Рекорды</span>
        </button>
      </nav>
    </div>
  </div>

  <div class="workout-overlay" id="workout-overlay" hidden>
    <div class="workout-modal">
      <div class="modal-head">
        <button class="icon-btn subtle" id="close-workout-flow" type="button" aria-label="Закрыть"> <i class='bx bxs-left-arrow' ></i> </button>
        <p id="modal-title">Добавить упражнения</p>
        <button class="icon-btn subtle" id="save-workout-flow" type="button" aria-label="Сохранить">✓</button>
      </div>
      <section class="modal-step active" data-step="list">
        <label class="field-card workout-name-card">
          
          <input type="text" id="workout-name-input" placeholder="Название тренировки">
        </label>
        <div id="draft-list" class="draft-list"></div>
        <button class="action-card secondary" id="add-draft-item" type="button">
          <span>Добавить упражнение</span>
          <span class="plus">+</span>
        </button>
        <button class="action-card danger" id="delete-workout-day" type="button" hidden>
          <span>Удалить тренировку</span>
          <span class="pluss"><i class='bx bx-trash'></i></span>
        </button>
      </section>

      <section class="modal-step" data-step="form">
        <label class="field-card">
         
          <input type="text" id="exercise-name-input" placeholder="Название упражнения">
        </label>
        <div class="metrics-card">
          <div class="metric-big">
            <span class="field-label">Вес (кг)</span>
            <input type="number" id="exercise-weight-input" min="0" step="0.5" placeholder="80">
          </div>
          <div class="counter-line">
            <span>Подходы</span>
            <div class="counter-control">
              <button class="counter-btn" data-counter="sets" data-direction="-1" type="button">−</button>
              <strong id="sets-value">1</strong>
              <button class="counter-btn" data-counter="sets" data-direction="1" type="button">+</button>
            </div>
          </div>
          <div class="counter-line">
            <span>Повторы</span>
            <div class="counter-control">
              <button class="counter-btn" data-counter="reps" data-direction="-1" type="button">−</button>
              <strong id="reps-value">8</strong>
              <button class="counter-btn" data-counter="reps" data-direction="1" type="button">+</button>
            </div>
          </div>
        </div>
        <button class="action-card primary" id="confirm-draft-item" type="button">
          <span>Сохранить упражнение</span>
          <span class="plusik"><i class='bx bx-check'></i></span>
        </button>
      </section>

      <section class="modal-step" data-step="date">
        <div class="date-card">
          <p class="field-label">Дата тренировки</p>
          
          <input type="date" id="workout-date-input">
        </div>
      </section>

      <section class="modal-step" data-step="comment">
        <section class="note-card workout-comment-card">
          <p class="workout-comment-title">Опишите своё состояние</p>
          <textarea id="wellbeing-note" placeholder="Опишите своё состояние:"></textarea>
        </section>
      </section>

      <section class="modal-step" data-step="done">
        <div class="result-card">
          <h2 class="savedtrain">Тренировка сохранена</h2>
          <p id="saved-summary">Все упражнения добавлены.</p>
        </div>
      </section>
    </div>  
  </div>

  <div class="workout-overlay" id="record-overlay" hidden>
    <div class="workout-modal record-modal">
      <div class="modal-head">
        <button class="icon-btn subtle" id="close-record-flow" type="button" aria-label="Закрыть"><i class='bx bxs-left-arrow'></i></button>
        <p>Добавить рекорд</p>
        <button class="icon-btn subtle" id="save-record-flow" type="button" aria-label="Сохранить">✓</button>
      </div>
      <section class="modal-step active">
        <label class="field-card record-field">
          <input type="text" id="record-exercise-input" placeholder="Название упражнения">
        </label>
        <div class="metrics-card record-metrics">
          <div class="metric-big">
            <span class="field-label">Вес (кг)</span>
            <input type="number" id="record-weight-input" min="0" step="0.5" placeholder="100">
          </div>
        </div>
      </section>
    </div>
  </div>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/motion@11.11.13/dist/motion.js"></script>
<script src="/static/app.js?v=27"></script>
</body>
</html>
