<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Progress Check</title>
  <link rel="stylesheet" href="/static/styles.css?v=20260309-1">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <h1 id="screen-title">Главная</h1>
      <div class="streak"><span id="streak-value">0</span>🔥</div>
    </header>

    <main class="content">
      <section class="panel active" data-panel="home">
        <button id="open-workout-flow" class="action-card" type="button">
          <span>Добавить тренировку</span>
          <span class="plus">+</span>
        </button>
        <section class="note-card">
          <textarea id="wellbeing-note" placeholder="Комментарий к тренировке на сегодня"></textarea>
          <button id="save-wellbeing-note" type="button">Сохранить комментарий</button>
        </section>
      </section>

      <section class="panel" data-panel="profile">
        <section class="profile-card">
          <h2>Ваши данные</h2>
          <div class="profile-row"><span>Имя</span><strong id="profile-name">—</strong></div>
          <div class="profile-row"><span>Вес</span><strong id="weight-value">—</strong></div>
          <div class="profile-row"><span>Рост</span><strong id="height-value">—</strong></div>
          <div class="profile-row"><span>Стаж</span><strong id="experience-value">—</strong></div>
          <div class="profile-row"><span>Тренировок</span><strong id="workouts-value">0</strong></div>
        </section>
        <h2 class="section-title">История тренировок</h2>
        <div id="history-list" class="list-stack"></div>
      </section>

      <section class="panel" data-panel="records">
        <h2 class="section-title">Рекорды</h2>
        <div id="records-list" class="list-stack"></div>
      </section>
    </main>

    <nav class="bottom-nav">
      <button class="nav-btn active" data-tab="home" type="button">Главная</button>
      <button class="nav-btn" data-tab="profile" type="button">Профиль</button>
      <button class="nav-btn" data-tab="records" type="button">Рекорды</button>
    </nav>
  </div>

  <div id="workout-overlay" class="overlay" hidden>
    <div class="modal">
      <div class="modal-head">
        <button id="close-workout-flow" type="button">Назад</button>
        <h3 id="modal-title">Добавить упражнения</h3>
        <button id="save-workout-flow" type="button">Далее</button>
      </div>

      <section class="modal-step active" data-step="list">
        <label class="field">
          <span>Название тренировки</span>
          <input id="workout-name-input" type="text" placeholder="например, День груди">
        </label>
        <div id="draft-list" class="draft-list"></div>
        <button id="add-draft-item" class="action-card" type="button">
          <span>Добавить упражнение</span>
          <span class="plus">+</span>
        </button>
      </section>

      <section class="modal-step" data-step="form">
        <label class="field">
          <span>Название упражнения</span>
          <input id="exercise-name-input" type="text" placeholder="жим лежа">
        </label>
        <label class="field">
          <span>Вес (кг)</span>
          <input id="exercise-weight-input" type="number" min="0" step="0.5" placeholder="80">
        </label>
        <div class="counter-line">
          <span>Подходы</span>
          <div>
            <button class="counter-btn" data-counter="sets" data-direction="-1" type="button">-</button>
            <strong id="sets-value">1</strong>
            <button class="counter-btn" data-counter="sets" data-direction="1" type="button">+</button>
          </div>
        </div>
        <div class="counter-line">
          <span>Повторы</span>
          <div>
            <button class="counter-btn" data-counter="reps" data-direction="-1" type="button">-</button>
            <strong id="reps-value">8</strong>
            <button class="counter-btn" data-counter="reps" data-direction="1" type="button">+</button>
          </div>
        </div>
        <button id="confirm-draft-item" class="action-card" type="button">
          <span>Сохранить упражнение</span>
          <span>✓</span>
        </button>
      </section>

      <section class="modal-step" data-step="date">
        <label class="field">
          <span>Дата тренировки</span>
          <input id="workout-date-input" type="date">
        </label>
      </section>
    </div>
  </div>

  <div id="save-overlay" class="save-overlay" hidden>
    <div class="save-box">
      <img src="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/svg/1f4aa.svg" alt="muscle">
      <div>Тренировка сохранена</div>
    </div>
  </div>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="/static/app.js?v=20260309-1"></script>
</body>
</html>
